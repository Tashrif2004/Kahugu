name: Jenga Jarvis APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pakua code
        uses: actions/checkout@v4

      - name: Weka Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Weka Android SDK
        uses: android-actions/setup-android@v3

      - name: Andaa local.properties
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> local.properties

      - name: Weka Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Jenga Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Pakia APK kama Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
